<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Notion2Council Hotkeys</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --danger: #ef4444;
      --ok: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #0b1120, var(--bg));
      color: var(--text);
      font-family: Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    main {
      padding: 22px;
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subhead {
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.45;
    }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.22);
    }

    .row {
      display: grid;
      grid-template-columns: 185px 1fr;
      gap: 14px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(51, 65, 85, 0.65);
    }

    .row:last-child { border-bottom: none; }

    label {
      font-weight: 650;
      color: #f8fafc;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b1220;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      font: inherit;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 13px;
      font: inherit;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      border-color: #60a5fa;
      color: white;
      font-weight: 700;
    }

    button:hover { filter: brightness(1.12); }

    .status {
      margin-top: 14px;
      min-height: 22px;
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }

    code {
      background: rgba(148, 163, 184, 0.16);
      padding: 2px 5px;
      border-radius: 6px;
      color: #dbeafe;
    }

    .path {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hotkey Settings</h1>
    <div class="subhead">
      Use Electron accelerator syntax. Examples: <code>Alt+Space</code>, <code>CommandOrControl+Shift+L</code>, <code>CommandOrControl+Shift+V</code>.
    </div>

    <section class="card">
      <div class="row">
        <div>
          <label for="toggleWindow">Show / Hide</label>
          <div class="hint">Toggle the desktop shell window.</div>
        </div>
        <input id="toggleWindow" autocomplete="off" spellcheck="false" />
      </div>

      <div class="row">
        <div>
          <label for="openChat">Open Chat</label>
          <div class="hint">Open the Council chat and focus the input.</div>
        </div>
        <input id="openChat" autocomplete="off" spellcheck="false" />
      </div>

      <div class="row">
        <div>
          <label for="clipboardToChat">Clipboard to Chat</label>
          <div class="hint">Open chat and place clipboard text into the prompt box.</div>
        </div>
        <input id="clipboardToChat" autocomplete="off" spellcheck="false" />
      </div>

      <div class="row">
        <div>
          <label for="openHotkeySettings">Open Hotkey Settings</label>
          <div class="hint">Open this settings window.</div>
        </div>
        <input id="openHotkeySettings" autocomplete="off" spellcheck="false" />
      </div>
    </section>

    <div class="buttons">
      <button class="primary" id="save">Save and Register</button>
      <button id="reset">Reset Defaults</button>
      <button id="testClipboard">Test Clipboard to Chat</button>
      <button id="reload">Reload</button>
    </div>

    <div id="status" class="status"></div>
    <div id="path" class="path"></div>
  </main>

  <script>
    const api = window.notion2CouncilHotkeys;
    const fields = ['toggleWindow', 'openChat', 'clipboardToChat', 'openHotkeySettings'];
    const status = document.getElementById('status');
    const pathEl = document.getElementById('path');

    function setStatus(text, kind = '') {
      status.textContent = text || '';
      status.className = `status ${kind}`.trim();
    }

    function readForm() {
      return Object.fromEntries(fields.map(id => [id, document.getElementById(id).value.trim()]));
    }

    function writeForm(values) {
      fields.forEach(id => {
        document.getElementById(id).value = values?.[id] || '';
      });
    }

    function formatRegistrations(registrations) {
      if (!registrations || !registrations.length) return '';
      return registrations.map(item => `${item.ok ? '✓' : '×'} ${item.name}: ${item.accelerator}`).join('\n');
    }

    async function load() {
      try {
        const data = await api.get();
        writeForm(data.current);
        pathEl.textContent = `Saved at: ${data.configPath}`;
        setStatus('Loaded current hotkeys.', 'ok');
      } catch (error) {
        setStatus(`Failed to load hotkeys: ${error.message}`, 'error');
      }
    }

    document.getElementById('save').addEventListener('click', async () => {
      try {
        const result = await api.save(readForm());
        writeForm(result.current);
        const failures = (result.registrations || []).filter(item => !item.ok);
        if (failures.length) {
          setStatus(`Saved, but some hotkeys could not be registered. They may already be used by Windows or another app.\n\n${formatRegistrations(result.registrations)}`, 'error');
        } else {
          setStatus(`Saved and registered.\n\n${formatRegistrations(result.registrations)}`, 'ok');
        }
      } catch (error) {
        setStatus(`Failed to save hotkeys: ${error.message}`, 'error');
      }
    });

    document.getElementById('reset').addEventListener('click', async () => {
      try {
        const result = await api.reset();
        writeForm(result.current);
        setStatus(`Defaults restored.\n\n${formatRegistrations(result.registrations)}`, result.ok ? 'ok' : 'error');
      } catch (error) {
        setStatus(`Failed to reset hotkeys: ${error.message}`, 'error');
      }
    });

    document.getElementById('testClipboard').addEventListener('click', async () => {
      try {
        await api.testClipboardToChat();
        setStatus('Clipboard-to-chat command sent.', 'ok');
      } catch (error) {
        setStatus(`Clipboard-to-chat test failed: ${error.message}`, 'error');
      }
    });

    document.getElementById('reload').addEventListener('click', load);
    load();
  </script>
</body>
</html>
