name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Read package version
        id: version
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          "version=$($pkg.version)" >> $env:GITHUB_OUTPUT
          "tag=v$($pkg.version)" >> $env:GITHUB_OUTPUT

      - name: Validate release ref
        shell: powershell
        run: |
          $expectedTag = "${{ steps.version.outputs.tag }}"
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_name }}" -ne $expectedTag) {
            throw "Release tag '${{ github.ref_name }}' must match package version tag '$expectedTag'."
          }

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Electron icons
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\create-electron-icons.ps1

      - name: Validate release inputs
        run: npm run validate:ci

      - name: Show build scripts
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.scripts | ConvertTo-Json -Depth 5
          $pkg.build | ConvertTo-Json -Depth 10

      - name: Build portable EXE
        run: npm run electron:build:exe

      - name: Build ZIP package
        run: npm run electron:build:zip

      - name: Build MSI setup
        run: npm run electron:build:msi

      - name: Stage single GitHub release package
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $stage = "github-release"
          $bundle = "Notion2Council-$version-windows-release.zip"

          Remove-Item $stage -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $assetRoot = Join-Path $stage "Notion2Council-$version"
          New-Item -ItemType Directory -Force -Path $assetRoot | Out-Null

          $expectedArtifacts = @(
            "release\Notion2Council-$version-portable.exe",
            "release\Notion2Council-$version-win-x64.zip",
            "release\Notion2Council-$version-setup.msi"
          )

          foreach ($artifact in $expectedArtifacts) {
            if (-not (Test-Path $artifact)) {
              throw "Expected release artifact missing: $artifact"
            }
            Copy-Item -Path $artifact -Destination $assetRoot -Force
          }

          $bundlePath = Join-Path $stage $bundle
          Compress-Archive -Path (Join-Path $assetRoot "*") -DestinationPath $bundlePath -Force

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $bundlePath))
          try {
            $entries = @($zip.Entries | ForEach-Object { $_.FullName })
          } finally {
            $zip.Dispose()
          }

          $expectedNames = @($expectedArtifacts | ForEach-Object { Split-Path $_ -Leaf })
          foreach ($name in $expectedNames) {
            if ($entries -notcontains $name) {
              throw "Release bundle missing expected file: $name"
            }
          }

          $hash = (Get-FileHash -Path $bundlePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = Join-Path $stage "$bundle.sha256"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($checksumPath, "$hash  $bundle`n", $utf8NoBom)

          Write-Host "Staged release asset: $stage\$bundle"
          Write-Host "Staged checksum: $stage\$bundle.sha256"
          Get-ChildItem $assetRoot -File | Format-Table Name, Length
          Get-ChildItem $stage -File | Format-Table Name, Length

      - name: Remove existing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          release_json=$(gh api "repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}" 2>/dev/null || true)
          if [ -z "$release_json" ]; then
            echo "No existing release for ${RELEASE_TAG}; nothing to clean."
            exit 0
          fi

          release_id=$(printf '%s' "$release_json" | jq -r '.id // empty')
          if [ -z "$release_id" ]; then
            echo "No release id found for ${RELEASE_TAG}; nothing to clean."
            exit 0
          fi

          gh api --paginate "repos/${{ github.repository }}/releases/${release_id}/assets" --jq '.[].id' |
            while read -r asset_id; do
              if [ -n "$asset_id" ]; then
                echo "Deleting release asset ${asset_id}"
                gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}"
              fi
            done

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Notion2Council-Windows
          path: |
            github-release/*.zip
            github-release/*.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Notion2Council ${{ steps.version.outputs.tag }}
          body: |
            Notion2Council desktop release ${{ steps.version.outputs.tag }}.

            This release publishes a single Windows package containing the portable EXE, ZIP package, and MSI setup installer.
          draft: false
          prerelease: false
          make_latest: true
          files: |
            github-release/*.zip
            github-release/*.sha256
