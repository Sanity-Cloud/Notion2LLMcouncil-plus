name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Electron icons
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\create-electron-icons.ps1

      - name: Show build scripts
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.scripts | ConvertTo-Json -Depth 5
          $pkg.build | ConvertTo-Json -Depth 10

      - name: Build portable EXE
        run: npm run electron:build:exe

      - name: Build ZIP package
        run: npm run electron:build:zip

      - name: Build MSI setup
        run: npm run electron:build:msi

      - name: Create source/runtime bundle
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\package-release.ps1 -SkipNpmInstall -SkipBuild -NoPause

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Notion2Council-Windows
          path: |
            release/**
            dist-release/**

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**
            dist-release/**
