name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Read package version
        id: version
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          "version=$($pkg.version)" >> $env:GITHUB_OUTPUT
          "tag=v$($pkg.version)" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Electron icons
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\create-electron-icons.ps1

      - name: Show build scripts
        shell: powershell
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.scripts | ConvertTo-Json -Depth 5
          $pkg.build | ConvertTo-Json -Depth 10

      - name: Build portable EXE
        run: npm run electron:build:exe

      - name: Build ZIP package
        run: npm run electron:build:zip

      - name: Build MSI setup
        run: npm run electron:build:msi

      - name: Create source/runtime bundle
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\package-release.ps1 -SkipNpmInstall -SkipBuild -NoPause

      - name: Stage single GitHub release package
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $stage = "github-release"
          $bundle = "Notion2Council-$version-windows-release.zip"

          Remove-Item $stage -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $assetRoot = Join-Path $stage "Notion2Council-$version"
          New-Item -ItemType Directory -Force -Path $assetRoot | Out-Null

          Get-ChildItem release -File -Include "*.exe","*.msi","*.zip","*.blockmap","*.yml" -Recurse -ErrorAction SilentlyContinue |
            Copy-Item -Destination $assetRoot -Force

          Get-ChildItem dist-release -File -Filter "*.zip" -Recurse -ErrorAction SilentlyContinue |
            Copy-Item -Destination $assetRoot -Force

          Compress-Archive -Path (Join-Path $assetRoot "*") -DestinationPath (Join-Path $stage $bundle) -Force

          Write-Host "Staged release asset: $stage\$bundle"
          Get-ChildItem $stage -File | Format-Table Name, Length

      - name: Remove existing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          release_id=$(gh api "repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}" --jq '.id' 2>/dev/null || true)
          if [ -z "$release_id" ]; then
            echo "No existing release for ${RELEASE_TAG}; nothing to clean."
            exit 0
          fi

          gh api --paginate "repos/${{ github.repository }}/releases/${release_id}/assets" --jq '.[].id' |
            while read -r asset_id; do
              if [ -n "$asset_id" ]; then
                echo "Deleting release asset ${asset_id}"
                gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}"
              fi
            done

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Notion2Council-Windows
          path: github-release/*.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Notion2Council ${{ steps.version.outputs.tag }}
          body: |
            Notion2Council desktop release ${{ steps.version.outputs.tag }}.

            This release publishes a single Windows package containing the portable EXE, ZIP package, MSI setup installer, and source/runtime bundle.
          draft: false
          prerelease: false
          make_latest: true
          files: github-release/*.zip
