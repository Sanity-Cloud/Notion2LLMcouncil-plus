name: Validate

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate repository
        run: npm run validate:ci
